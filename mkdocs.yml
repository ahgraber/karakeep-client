site_name: karakeep-client
site_description: Python client for the Karakeep API
docs_dir: docs
site_dir: site

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            merge_init_into_class: true
            members_order: source

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

nav:
  - Home: index.md
  - Overview: overview.md
  - Quickstart: quickstart.md
  - API Reference:
      - Overview: reference/index.md
      - Karakeep Client: reference/karakeep.md
      - Models: reference/models.md
