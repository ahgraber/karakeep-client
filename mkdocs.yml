site_name: karakeep-client
site_description: Python client for the Karakeep API
docs_dir: docs
site_dir: site

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            merge_init_into_class: true
            members_order: source

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

extra_css:
  - stylesheets/brand-theme.css

nav:
  - Home: index.md
  - Overview: overview.md
  - Quickstart: quickstart.md
  - Docat Handoff: docat-handoff.md
  - API Reference:
      - Overview: reference/index.md
      - Karakeep Client: reference/karakeep.md
      - Models: reference/models.md
